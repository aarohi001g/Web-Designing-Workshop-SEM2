//diamond pattern

<!DOCTYPE html>
<html>
<body>

<pre id="pattern"></pre>

<script>
let n = 5;
let output = "";

// Upper pyramid
for(let i = 1; i <= n; i++) {

    for(let j = 1; j <= n-i; j++) {
        output += " ";
    }

    for(let k = 1; k <= (2*i-1); k++) {
        output += "*";
    }

    output += "\n";
}

// Lower pyramid
for(let i = n-1; i >= 1; i--) {

    for(let j = 1; j <= n-i; j++) {
        output += " ";
    }

    for(let k = 1; k <= (2*i-1); k++) {
        output += "*";
    }

    output += "\n";
}

document.getElementById("pattern").textContent = output;
</script>

</body>
</html>
